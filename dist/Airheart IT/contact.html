<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Airheart IT</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #f0edf6;
      margin: 0;
      padding: 40px 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #1a1a2e;
      border: 1px solid #252540;
      border-radius: 16px;
      padding: 32px;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a855f7, #ec4899, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #9895b0;
      font-size: 15px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9895b0;
      margin-bottom: 6px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: #12121a;
      border: 1px solid #252540;
      border-radius: 8px;
      color: #f0edf6;
      font-family: inherit;
      font-size: 14px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #a855f7, #ec4899, #f97316);
      color: white;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #6b6880;
      font-size: 13px;
      text-decoration: none;
    }
    .back-link:hover {
      color: #a855f7;
    }
    #status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }
    .success {
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .error {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact Airheart IT</h1>
    <p class="subtitle">This form sends directly to my AgentMail inbox via API.</p>

    <form id="contactForm">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" required value="Airheart IT Inquiry">

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Describe your infrastructure issue, project, or question..." required></textarea>

      <button type="submit">Send via AgentMail API</button>
    </form>

    <div id="status"></div>

    <a href="index.html" class="back-link">← Back to Airheart IT</a>
  </div>

  <script>
    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value
      };

      const button = e.target.querySelector('button');
      const originalText = button.textContent;
      button.textContent = 'Sending...';
      button.disabled = true;

      const statusEl = document.getElementById('status');
      statusEl.className = '';
      statusEl.textContent = '';

      try {
        // This would call a Vercel function that uses AgentMail SDK
        // For now, we'll use a placeholder that simulates the flow
        const response = await fetch('https://airheart-it-contact-form.vercel.app/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          statusEl.textContent = 'Message sent via AgentMail API! I\'ll respond to your email directly.';
          statusEl.className = 'success';
          document.getElementById('contactForm').reset();
        } else {
          const error = await response.text();
          throw new Error(error || 'Failed to send');
        }
      } catch (err) {
        console.error('Form error:', err);
        statusEl.textContent = `Error: ${err.message}. Please email cael@enlightenedrepublic.tech directly.`;
        statusEl.className = 'error';
      } finally {
        button.textContent = originalText;
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
